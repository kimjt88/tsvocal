version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci --include=dev
        build:
          commands:
            # Run everything in one shell block. CodeBuild executes each "- item"
            # as a separate shell, and user-supplied env vars sometimes don't
            # propagate to later commands. Putting it all in one block guarantees
            # the same shell environment throughout.
            - |
              set -e
              echo "--- env vars exposed to build (names only) ---"
              env | cut -d= -f1 | grep -E '^(APP_|DYNAMODB_|S3_|ADMIN_|NEXT_PUBLIC_|AWS_)' | sort || echo "(none)"
              echo "--- end ---"

              echo "--- direct variable readability check ---"
              for v in APP_REGION APP_ACCESS_KEY_ID APP_SECRET_ACCESS_KEY ADMIN_SESSION_SECRET APP_ENCRYPTION_KEY DYNAMODB_ADMINS_TABLE DYNAMODB_ACADEMY_TABLE S3_BUCKET_NAME NEXT_PUBLIC_S3_BASE_URL NEXT_PUBLIC_SITE_URL NAVER_SITE_VERIFICATION GOOGLE_SITE_VERIFICATION; do
                val=$(printenv "$v" 2>/dev/null || true)
                if [ -n "$val" ]; then
                  printf '  %s: SET (%d chars)\n' "$v" "${#val}"
                else
                  printf '  %s: EMPTY or UNSET\n' "$v"
                fi
              done
              echo "--- end ---"

              # Write .env.production using printenv per variable (more robust than env|grep).
              : > .env.production
              for v in APP_REGION APP_ACCESS_KEY_ID APP_SECRET_ACCESS_KEY ADMIN_SESSION_SECRET APP_ENCRYPTION_KEY DYNAMODB_ADMINS_TABLE DYNAMODB_ACADEMY_TABLE S3_BUCKET_NAME NEXT_PUBLIC_S3_BASE_URL NEXT_PUBLIC_SITE_URL NAVER_SITE_VERIFICATION GOOGLE_SITE_VERIFICATION; do
                val=$(printenv "$v" 2>/dev/null || true)
                if [ -n "$val" ]; then
                  printf '%s=%s\n' "$v" "$val" >> .env.production
                fi
              done
              echo "Wrote $(wc -l < .env.production) env vars to .env.production ($(wc -c < .env.production) bytes)"

              npm run build

              # Bundle .env.production into the SSR runtime artifact.
              cp .env.production .next/.env.production 2>/dev/null || true
              test -d .next/standalone && cp .env.production .next/standalone/.env.production || true

              echo "--- .env.production locations ---"
              ls -la .env.production .next/.env.production .next/standalone/.env.production 2>/dev/null || true
              echo "--- end ---"
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
