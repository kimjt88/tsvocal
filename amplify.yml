version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci --include=dev
        build:
          commands:
            # Diagnostic: list env var names that match our app prefixes.
            # If this prints "(none)" the Amplify console vars never reached the build container —
            # check that variables are set at App level (Hosting → Environment variables) AND
            # that no branch-level override is blanking them out.
            - echo "--- env vars exposed to build (names only) ---"
            - env | cut -d= -f1 | grep -E '^(APP_|DYNAMODB_|S3_|ADMIN_|NEXT_PUBLIC_|AWS_)' | sort || echo "(none)"
            - echo "--- end ---"
            # Forward to .env.production for runtime SSR; tolerate zero matches without killing the build.
            - env | grep -E '^(APP_|DYNAMODB_|S3_|ADMIN_|NEXT_PUBLIC_)=' >> .env.production || true
            - echo "Wrote $(wc -l < .env.production 2>/dev/null || echo 0) env vars to .env.production"
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
